name: Post-Deploy Warm Cache

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      base_url:
        description: Base URL to warm and smoke-test
        required: false
        default: https://krukraft.com
      perf_suite:
        description: Perf suite to run for the main gated verification job
        required: false
        default: smoke
        type: choice
        options:
          - smoke
          - full
          - sentinel
          - listing-drilldown

concurrency:
  group: post-deploy-perf-${{ github.event.deployment.id || github.ref }}-${{ github.event.deployment.environment || github.event.deployment_status.environment || 'unknown' }}
  cancel-in-progress: true

jobs:
  resolve_context:
    name: Resolve Deployment Context
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.classify.outputs.should_run }}
      base_url: ${{ steps.classify.outputs.base_url }}
      reason: ${{ steps.classify.outputs.reason }}
      perf_suite: ${{ steps.classify.outputs.perf_suite }}
    env:
      PRODUCTION_BASE_URL: https://krukraft.com

    steps:
      - name: Classify Deployment
        id: classify
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          DEPLOYMENT_STATE: ${{ github.event.deployment_status.state }}
          DEPLOYMENT_ENVIRONMENT: ${{ github.event.deployment.environment }}
          DEPLOYMENT_STATUS_ENVIRONMENT: ${{ github.event.deployment_status.environment }}
          DEPLOYMENT_ENVIRONMENT_URL: ${{ github.event.deployment_status.environment_url }}
          DEPLOYMENT_TARGET_URL: ${{ github.event.deployment_status.target_url }}
          DISPATCH_BASE_URL: ${{ inputs.base_url }}
          DISPATCH_PERF_SUITE: ${{ inputs.perf_suite }}
        run: |
          set -euo pipefail

          lower() {
            printf '%s' "$1" | tr '[:upper:]' '[:lower:]'
          }

          url_host() {
            local value="${1:-}"
            value="${value#http://}"
            value="${value#https://}"
            value="${value%%/*}"
            lower "$value"
          }

          event_name="$(lower "${GITHUB_EVENT_NAME:-}")"
          deployment_state="$(lower "${DEPLOYMENT_STATE:-}")"
          deployment_environment="$(lower "${DEPLOYMENT_ENVIRONMENT:-}")"
          deployment_status_environment="$(lower "${DEPLOYMENT_STATUS_ENVIRONMENT:-}")"
          production_host="$(url_host "${PRODUCTION_BASE_URL:-}")"
          environment_url="${DEPLOYMENT_ENVIRONMENT_URL:-}"
          target_url="${DEPLOYMENT_TARGET_URL:-}"
          dispatch_base_url="${DISPATCH_BASE_URL:-}"
          environment_host="$(url_host "$environment_url")"
          target_host="$(url_host "$target_url")"

          base_url="${PRODUCTION_BASE_URL:-}"
          source_name="PRODUCTION_BASE_URL"

          if [ -z "$base_url" ] && [ -n "$environment_url" ]; then
            base_url="$environment_url"
            source_name="deployment_status.environment_url"
          fi
          if [ -z "$base_url" ] && [ -n "$target_url" ]; then
            base_url="$target_url"
            source_name="deployment_status.target_url"
          fi
          if [ -n "$dispatch_base_url" ]; then
            base_url="$dispatch_base_url"
            source_name="workflow_dispatch.input.base_url"
          fi

          should_run="false"
          reason="deployment state is not success"
          perf_suite="smoke"

          if [ "$event_name" = "workflow_dispatch" ]; then
            if [ -n "${DISPATCH_PERF_SUITE:-}" ]; then
              perf_suite="${DISPATCH_PERF_SUITE}"
            fi
            if [ -n "$base_url" ]; then
              should_run="true"
              reason="manual workflow_dispatch"
            else
              reason="manual workflow_dispatch missing base_url"
            fi
          elif [ "$deployment_state" = "success" ]; then
            if [ "$deployment_environment" = "production" ] || [ "$deployment_status_environment" = "production" ]; then
              should_run="true"
              reason="deployment environment marked as production"
            elif [ -n "$production_host" ] && { [ "$environment_host" = "$production_host" ] || [ "$target_host" = "$production_host" ]; }; then
              should_run="true"
              reason="deployment URL matches production host"
            else
              reason="deployment did not match production environment or production host"
            fi
          fi

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "perf_suite=$perf_suite" >> "$GITHUB_OUTPUT"

          if [ -n "$base_url" ]; then
            base_url="${base_url%/}"
            echo "base_url=$base_url" >> "$GITHUB_OUTPUT"
            echo "[post-deploy-warm] Resolved BASE_URL from ${source_name}: $base_url"
          else
            echo "[post-deploy-warm] BASE_URL could not be resolved from deployment payload."
          fi

          echo "[post-deploy-warm] should_run=${should_run} reason=${reason}"

  warm_cache:
    name: Warm Public Cache
    needs: resolve_context
    if: needs.resolve_context.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    outputs:
      base_url: ${{ needs.resolve_context.outputs.base_url }}
    env:
      BASE_URL: ${{ needs.resolve_context.outputs.base_url }}
      HOT_SLUG: middle-school-science-quiz-assessment-set
      CATEGORY: science

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/npm-logs

          max_attempts=3
          attempt=1

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "[post-deploy-warm] npm ci attempt ${attempt}/${max_attempts}"

            if npm ci 2>&1 | tee "artifacts/npm-ci-attempt-${attempt}.log"; then
              exit 0
            fi

            cp -R ~/.npm/_logs/. artifacts/npm-logs/ 2>/dev/null || true

            if [ "$attempt" -lt "$max_attempts" ]; then
              backoff_seconds=$((attempt * 5))
              echo "[post-deploy-warm] npm ci failed on attempt ${attempt}; retrying in ${backoff_seconds}s"
              sleep "$backoff_seconds"
            fi

            attempt=$((attempt + 1))
          done

          echo "[post-deploy-warm] npm ci failed after ${max_attempts} attempts"
          exit 1

      - name: Validate BASE_URL
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${BASE_URL:-}" ]; then
            echo "[post-deploy-warm] Failed to resolve BASE_URL from deployment context."
            exit 1
          fi

      - name: Wait For Production To Go Live
        shell: bash
        run: |
          set -euo pipefail

          url="${BASE_URL%/}/resources"
          max_attempts=30
          sleep_seconds=10

          echo "[post-deploy-warm] Waiting for ${url} to return success"

          for attempt in $(seq 1 "$max_attempts"); do
            status="$(curl -A 'Krukraft-Warmup/1.0' -L -s -o /dev/null -w '%{http_code}' "$url" || true)"

            if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
              echo "[post-deploy-warm] Production is live (status ${status})"
              exit 0
            fi

            echo "[post-deploy-warm] Attempt ${attempt}/${max_attempts} not ready yet (status: ${status:-ERR})"
            sleep "$sleep_seconds"
          done

          echo "[post-deploy-warm] Timed out waiting for production deployment to go live"
          exit 1

      - name: Warm Public Routes
        shell: bash
        env:
          PERFORMANCE_WARM_SECRET: ${{ secrets.PERFORMANCE_WARM_SECRET }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          echo "[post-deploy-warm] BASE_URL=${BASE_URL}"
          BASE_URL="${BASE_URL}" npm run warm:cache 2>&1 | tee artifacts/warm-cache.log

      - name: Upload Warm Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: post-deploy-warm-artifacts
          path: |
            artifacts/npm-ci-attempt-*.log
            artifacts/npm-logs/**
            artifacts/warm-cache.log
          if-no-files-found: warn

  perf_smoke:
    name: Run Post-Deploy Performance Verification
    needs:
      - resolve_context
      - warm_cache
    if: needs.resolve_context.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      BASE_URL: ${{ needs.warm_cache.outputs.base_url }}
      HOT_SLUG: middle-school-science-quiz-assessment-set
      CATEGORY: science
      PERF_SUITE: ${{ needs.resolve_context.outputs.perf_suite }}
      PERF_RESULTS_DIR: artifacts/k6
      PERF_SUMMARY_PATH: artifacts/perf-summary.json

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run Post-Deploy Performance Verification
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/k6
          echo "[post-deploy-perf] BASE_URL=${BASE_URL}"
          echo "[post-deploy-perf] PERF_SUITE=${PERF_SUITE}"
          if [ "${PERF_SUITE}" = "smoke" ]; then
            npm run perf:post-deploy 2>&1 | tee artifacts/perf-smoke.log
          else
            tsx scripts/run-post-deploy-perf.ts --suite="${PERF_SUITE}" 2>&1 | tee artifacts/perf-smoke.log
          fi

      - name: Upload Performance Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: post-deploy-perf-summary
          path: |
            artifacts/perf-smoke.log
            artifacts/perf-summary.json
            artifacts/k6/
          if-no-files-found: warn

      - name: Write Workflow Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Post-deploy warm + perf"
            echo ""
            echo "- BASE_URL: ${BASE_URL}"
            echo "- Main perf suite: ${PERF_SUITE}"
            echo "- Warm artifacts: post-deploy-warm-artifacts"
            echo "- Perf artifacts: post-deploy-perf-summary"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f artifacts/perf-summary.json ]; then
            node --input-type=module -e 'import fs from "node:fs"; const summary = JSON.parse(fs.readFileSync("artifacts/perf-summary.json", "utf8")); const rollup = summary.rollup ?? {}; const results = Array.isArray(summary.results) ? summary.results : []; console.log(""); console.log("### Perf rollup"); console.log(""); console.log(`- Suite: ${summary.suite ?? "unknown"}`); console.log(`- Status: ${(rollup.status ?? "unknown").toString().toUpperCase()}`); console.log(`- Passed routes: ${rollup.passedRouteCount ?? "n/a"}/${results.length}`); console.log(`- Failed routes: ${rollup.failedRouteCount ?? "n/a"}`); if (rollup.worstP95Route?.name) { console.log(`- Worst p95: ${rollup.worstP95Route.name} (${rollup.worstP95Route.p95Ms?.toFixed?.(2) ?? "n/a"}ms / ${rollup.worstP95Route.thresholdMs}ms budget)`); } if (rollup.nearestBudgetRoute?.name) { const headroom = rollup.nearestBudgetRoute.headroomMs; const formattedHeadroom = typeof headroom === "number" ? `${headroom >= 0 ? "+" : ""}${headroom.toFixed(2)}ms` : "n/a"; console.log(`- Nearest budget: ${rollup.nearestBudgetRoute.name} (${rollup.nearestBudgetRoute.p95Ms?.toFixed?.(2) ?? "n/a"}ms, headroom ${formattedHeadroom})`); } console.log(""); console.log("| Route | p95 | Budget | Status |"); console.log("| --- | ---: | ---: | --- |"); for (const result of results) { const p95 = typeof result.p95Ms === "number" ? `${result.p95Ms.toFixed(2)}ms` : "n/a"; const status = result.thresholdPassed ? "PASS" : "FAIL"; console.log(`| ${result.name} | ${p95} | ${result.thresholdMs}ms | ${status} |`); }' >> "$GITHUB_STEP_SUMMARY"
          fi

  perf_sentinel:
    name: Run Post-Deploy Sentinel Verification
    needs:
      - resolve_context
      - warm_cache
      - perf_smoke
    if: always() && needs.resolve_context.outputs.should_run == 'true' && needs.resolve_context.outputs.perf_suite == 'smoke' && needs.warm_cache.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      BASE_URL: ${{ needs.warm_cache.outputs.base_url }}
      SENTINEL_CATEGORY: art-creativity
      SENTINEL_QUERY: worksheet
      PERF_SUITE: sentinel
      PERF_RESULTS_DIR: artifacts/k6-sentinel
      PERF_SUMMARY_PATH: artifacts/perf-sentinel-summary.json

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run Post-Deploy Sentinel Verification
        id: sentinel_run
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/k6-sentinel
          echo "[post-deploy-perf-sentinel] BASE_URL=${BASE_URL}"
          echo "[post-deploy-perf-sentinel] PERF_SUITE=${PERF_SUITE}"
          npm run perf:post-deploy:sentinel 2>&1 | tee artifacts/perf-sentinel.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Sentinel Performance Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: post-deploy-perf-sentinel-summary
          path: |
            artifacts/perf-sentinel.log
            artifacts/perf-sentinel-summary.json
            artifacts/k6-sentinel/
          if-no-files-found: warn

      - name: Write Sentinel Workflow Summary
        if: always()
        shell: bash
        run: |
          {
            echo ""
            echo "### Sentinel perf (report-only)"
            echo ""
            echo "- Suite: sentinel"
            echo "- Exit code: ${{ steps.sentinel_run.outputs.exit_code }}"
            echo "- Artifacts: post-deploy-perf-sentinel-summary"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f artifacts/perf-sentinel-summary.json ]; then
            node --input-type=module -e 'import fs from "node:fs"; const summary = JSON.parse(fs.readFileSync("artifacts/perf-sentinel-summary.json", "utf8")); const results = Array.isArray(summary.results) ? summary.results : []; console.log(""); console.log("| Sentinel route | p95 | Budget | Status |"); console.log("| --- | ---: | ---: | --- |"); for (const result of results) { const p95 = typeof result.p95Ms === "number" ? `${result.p95Ms.toFixed(2)}ms` : "n/a"; const status = result.thresholdPassed ? "PASS" : "FAIL"; console.log(`| ${result.name} | ${p95} | ${result.thresholdMs}ms | ${status} |`); }' >> "$GITHUB_STEP_SUMMARY"
          fi
