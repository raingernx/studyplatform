name: Post-Deploy Warm Cache

on:
  deployment_status:

concurrency:
  group: post-deploy-perf-${{ github.event.deployment.id || github.ref }}-${{ github.event.deployment.environment || github.event.deployment_status.environment || 'unknown' }}
  cancel-in-progress: true

jobs:
  resolve_context:
    name: Resolve Deployment Context
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.classify.outputs.should_run }}
      base_url: ${{ steps.classify.outputs.base_url }}
      reason: ${{ steps.classify.outputs.reason }}
    env:
      PRODUCTION_BASE_URL: https://krucrafts.com

    steps:
      - name: Classify Deployment
        id: classify
        shell: bash
        env:
          DEPLOYMENT_STATE: ${{ github.event.deployment_status.state }}
          DEPLOYMENT_ENVIRONMENT: ${{ github.event.deployment.environment }}
          DEPLOYMENT_STATUS_ENVIRONMENT: ${{ github.event.deployment_status.environment }}
          DEPLOYMENT_ENVIRONMENT_URL: ${{ github.event.deployment_status.environment_url }}
          DEPLOYMENT_TARGET_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          set -euo pipefail

          lower() {
            printf '%s' "$1" | tr '[:upper:]' '[:lower:]'
          }

          url_host() {
            local value="${1:-}"
            value="${value#http://}"
            value="${value#https://}"
            value="${value%%/*}"
            lower "$value"
          }

          deployment_state="$(lower "${DEPLOYMENT_STATE:-}")"
          deployment_environment="$(lower "${DEPLOYMENT_ENVIRONMENT:-}")"
          deployment_status_environment="$(lower "${DEPLOYMENT_STATUS_ENVIRONMENT:-}")"
          production_host="$(url_host "${PRODUCTION_BASE_URL:-}")"
          environment_url="${DEPLOYMENT_ENVIRONMENT_URL:-}"
          target_url="${DEPLOYMENT_TARGET_URL:-}"
          environment_host="$(url_host "$environment_url")"
          target_host="$(url_host "$target_url")"

          base_url="${PRODUCTION_BASE_URL:-}"
          source_name="PRODUCTION_BASE_URL"

          if [ -z "$base_url" ] && [ -n "$environment_url" ]; then
            base_url="$environment_url"
            source_name="deployment_status.environment_url"
          fi
          if [ -z "$base_url" ] && [ -n "$target_url" ]; then
            base_url="$target_url"
            source_name="deployment_status.target_url"
          fi

          should_run="false"
          reason="deployment state is not success"

          if [ "$deployment_state" = "success" ]; then
            if [ "$deployment_environment" = "production" ] || [ "$deployment_status_environment" = "production" ]; then
              should_run="true"
              reason="deployment environment marked as production"
            elif [ -n "$production_host" ] && { [ "$environment_host" = "$production_host" ] || [ "$target_host" = "$production_host" ]; }; then
              should_run="true"
              reason="deployment URL matches production host"
            else
              reason="deployment did not match production environment or production host"
            fi
          fi

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

          if [ -n "$base_url" ]; then
            base_url="${base_url%/}"
            echo "base_url=$base_url" >> "$GITHUB_OUTPUT"
            echo "[post-deploy-warm] Resolved BASE_URL from ${source_name}: $base_url"
          else
            echo "[post-deploy-warm] BASE_URL could not be resolved from deployment payload."
          fi

          echo "[post-deploy-warm] should_run=${should_run} reason=${reason}"

  warm_cache:
    name: Warm Public Cache
    needs: resolve_context
    if: needs.resolve_context.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    outputs:
      base_url: ${{ needs.resolve_context.outputs.base_url }}
    env:
      BASE_URL: ${{ needs.resolve_context.outputs.base_url }}
      HOT_SLUG: middle-school-science-quiz-assessment-set
      CATEGORY: science

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Validate BASE_URL
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${BASE_URL:-}" ]; then
            echo "[post-deploy-warm] Failed to resolve BASE_URL from deployment context."
            exit 1
          fi

      - name: Wait For Production To Go Live
        shell: bash
        run: |
          set -euo pipefail

          url="${BASE_URL%/}/resources"
          max_attempts=30
          sleep_seconds=10

          echo "[post-deploy-warm] Waiting for ${url} to return success"

          for attempt in $(seq 1 "$max_attempts"); do
            status="$(curl -A 'KruCraft-Warmup/1.0' -L -s -o /dev/null -w '%{http_code}' "$url" || true)"

            if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
              echo "[post-deploy-warm] Production is live (status ${status})"
              exit 0
            fi

            echo "[post-deploy-warm] Attempt ${attempt}/${max_attempts} not ready yet (status: ${status:-ERR})"
            sleep "$sleep_seconds"
          done

          echo "[post-deploy-warm] Timed out waiting for production deployment to go live"
          exit 1

      - name: Warm Public Routes
        shell: bash
        env:
          PERFORMANCE_WARM_SECRET: ${{ secrets.PERFORMANCE_WARM_SECRET }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          echo "[post-deploy-warm] BASE_URL=${BASE_URL}"
          BASE_URL="${BASE_URL}" npm run warm:cache 2>&1 | tee artifacts/warm-cache.log

      - name: Warm Internal Public Cache Layers
        shell: bash
        env:
          PERFORMANCE_WARM_SECRET: ${{ secrets.PERFORMANCE_WARM_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${PERFORMANCE_WARM_SECRET:-}" ]; then
            echo "[post-deploy-warm] PERFORMANCE_WARM_SECRET is not configured; skipping internal cache warm."
            exit 0
          fi
          WARM_BASE_URL="${BASE_URL}" npm run performance:warm 2>&1 | tee artifacts/warm-internal.log

      - name: Upload Warm Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-warm-artifacts
          path: |
            artifacts/warm-cache.log
            artifacts/warm-internal.log
          if-no-files-found: warn

  perf_smoke:
    name: Run Post-Deploy Performance Verification
    needs:
      - resolve_context
      - warm_cache
    if: needs.resolve_context.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      BASE_URL: ${{ needs.warm_cache.outputs.base_url }}
      HOT_SLUG: middle-school-science-quiz-assessment-set
      CATEGORY: science
      PERF_SUITE: smoke
      PERF_RESULTS_DIR: artifacts/k6
      PERF_SUMMARY_PATH: artifacts/perf-summary.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run Post-Deploy Performance Verification
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/k6
          echo "[post-deploy-perf] BASE_URL=${BASE_URL}"
          npm run perf:post-deploy 2>&1 | tee artifacts/perf-smoke.log

      - name: Upload Performance Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-perf-summary
          path: |
            artifacts/perf-smoke.log
            artifacts/perf-summary.json
            artifacts/k6/
          if-no-files-found: warn

      - name: Write Workflow Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Post-deploy warm + perf"
            echo ""
            echo "- BASE_URL: ${BASE_URL}"
            echo "- Warm artifacts: post-deploy-warm-artifacts"
            echo "- Perf artifacts: post-deploy-perf-summary"
          } >> "$GITHUB_STEP_SUMMARY"
